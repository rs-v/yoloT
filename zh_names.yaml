# 目标类别中文名称映射 / Chinese class name mapping
#
# 格式：<模型中的拼音或英文类别名>: <显示用中文名>
# Format: <pinyin or English class name in model>: <Chinese display name>
#
# 使用方法 / Usage:
#   python rtsp_track.py --names zh_names.yaml
#
# 将此文件中的键（左侧）替换为您的模型实际使用的类别名称，
# 将值（右侧）替换为希望在视频画面上显示的中文名称。
# Replace the keys (left) with the actual class names your model uses,
# and the values (right) with the Chinese labels to display on the video.

# 常见示例 / Common examples:
person: 人
pedestrian: 行人
xingren: 行人
car: 小汽车
truck: 卡车
bus: 公交车
motorcycle: 摩托车
bicycle: 自行车
motorbike: 摩托车
jidongche: 机动车
feijidongche: 非机动车
vehicle: 车辆
dog: 狗
cat: 猫
bird: 鸟
